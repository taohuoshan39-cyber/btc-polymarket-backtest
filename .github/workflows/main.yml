name: BTC Polymarket 15m Backtest
# Strategy: fixed-10u-vs-full-compound-60d-validation

on:
  workflow_dispatch:
    inputs:
      windows:
        description: 回测轮数
        required: true
        default: "5760"
  push:
    branches: [main]
    paths:
      - ".github/workflows/main.yml"
  schedule:
    # GitHub cron uses UTC; 00:15 UTC = 08:15 China Standard Time.
    - cron: "15 0 * * *"

env:
  TZ: Asia/Shanghai

concurrency:
  group: btc-polymarket-15m-backtest
  cancel-in-progress: true

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout strategy code
        uses: actions/checkout@v4

      - name: Download project
        run: |
          curl -L "https://github.com/user-attachments/files/30051712/btc_consensus_v3.zip" -o project.zip
          unzip project.zip -d app

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements.txt

      - name: Download Polymarket history
        working-directory: app
        run: |
          python polymarket_history.py \
            --anchor-slug btc-updown-15m-1784117700 \
            --windows "${{ github.event_name == 'schedule' && '2880' || inputs.windows || '5760' }}" \
            --decision-minute 5 \
            --out pm_history.csv

      - name: Download Binance data
        working-directory: app
        run: |
          sed -i "s/'interval':'5m'/'interval':'1m'/" fetch_binance.py
          sed -i 's/+300000/+60000/' fetch_binance.py
          sed -i 's#https://api.binance.com#https://data-api.binance.vision#' fetch_binance.py
          python fetch_binance.py \
            --days ${{ github.event_name == 'schedule' && '45' || '75' }} \
            --out BTCUSDT_1m.csv

      - name: Train 31 agents
        working-directory: app
        run: |
          python polymarket_15m.py \
            --csv BTCUSDT_1m.csv \
            --decision-minute 5 \
            --min-train 672 \
            --out pm15

      - name: Normalize prediction timestamps
        working-directory: app
        run: |
          python -c "import pandas as pd; p=pd.read_csv('pm15_predictions.csv'); p=p.rename(columns={p.columns[0]:'timestamp'}).drop(columns=['actual'],errors='ignore'); p['start_ts']=pd.to_datetime(p['timestamp'],utc=True).map(lambda x:int(x.timestamp())); p.to_csv('pm15_predictions.csv',index=False)"

      - name: Exact Polymarket backtest
        working-directory: app
        run: |
          python market_backtest.py \
            --markets pm_history.csv \
            --predictions pm15_predictions.csv \
            --stake 10 \
            --slippage 0.01 \
            --out exact_report.json

      - name: Value profiles backtest
        working-directory: app
        run: |
          python "$GITHUB_WORKSPACE/risk_backtest.py" \
            --markets pm_history.csv \
            --predictions pm15_predictions.csv \
            --bankroll 1000 --edge 0.06 --min-votes 29 --min-paid 0.40 \
            --kelly-fraction 0.25 --max-position 0.03 --slippage 0.01 \
            --profit-reinvest 1 --dd-soft 1 --dd-hard 1 \
            --out value_growth_report.json
          python "$GITHUB_WORKSPACE/risk_backtest.py" \
            --markets pm_history.csv \
            --predictions pm15_predictions.csv \
            --bankroll 1000 --edge 0.06 --min-votes 29 --min-paid 0.40 \
            --kelly-fraction 0.25 --max-position 0.0275 --slippage 0.01 \
            --profit-reinvest 1 --risk-capital-cap 3000 --dd-soft 1 --dd-hard 1 \
            --out value_growth_defensive_report.json
          python "$GITHUB_WORKSPACE/risk_backtest.py" \
            --markets pm_history.csv \
            --predictions pm15_predictions.csv \
            --bankroll 1000 --edge 0.06 --min-votes 30 --min-paid 0.45 \
            --kelly-fraction 0.25 --max-position 0.02 --slippage 0.01 \
            --out value_balanced_report.json
          python "$GITHUB_WORKSPACE/risk_backtest.py" \
            --markets pm_history.csv \
            --predictions pm15_predictions.csv \
            --bankroll 1000 --edge 0.06 --min-votes 30 --min-paid 0.55 \
            --kelly-fraction 0.25 --max-position 0.025 --slippage 0.01 \
            --out value_high_win_report.json

      - name: Pure stake comparison (same signals)
        working-directory: app
        run: |
          python "$GITHUB_WORKSPACE/risk_backtest.py" \
            --markets pm_history.csv \
            --predictions pm15_predictions.csv \
            --bankroll 1000 --edge 0.06 --min-votes 29 --min-paid 0.40 \
            --kelly-fraction 0.25 --max-position 0.03 --slippage 0.01 \
            --fixed-stake 10 --daily-stop 0 --dd-soft 1 --dd-hard 1 \
            --out comparison_fixed_10u_report.json
          python "$GITHUB_WORKSPACE/risk_backtest.py" \
            --markets pm_history.csv \
            --predictions pm15_predictions.csv \
            --bankroll 1000 --edge 0.06 --min-votes 29 --min-paid 0.40 \
            --kelly-fraction 0.25 --max-position 0.03 --slippage 0.01 \
            --profit-reinvest 1 --daily-stop 0 --dd-soft 1 --dd-hard 1 \
            --out comparison_full_compound_report.json

      - name: Balanced return-first backtest
        working-directory: app
        run: |
          python "$GITHUB_WORKSPACE/balanced_backtest.py" \
            --markets pm_history.csv \
            --predictions pm15_predictions.csv \
            --btc BTCUSDT_1m.csv \
            --bankroll 1000 \
            --base-position 0.01 \
            --slippage 0.01 \
            --out balanced_report.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: btc-polymarket-results
          path: |
            app/*.json
            app/*.csv
            app/*.graphml
          retention-days: 30
